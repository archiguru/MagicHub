🇸🇬 新加坡节点 = fallback, include-other-group=🏳️‍🌈 SubNodes, update-interval=0, policy-regex-filter=(🇸🇬)|(新加坡)|(Singapore)|(SG), no-alert=1, hidden=1
🇨🇳 台湾VIP = url-test, include-other-group=💨 VIPNodes, update-interval=7200, policy-regex-filter=(🇨🇳)|(台)|(Tai)|(TW), no-alert=1, hidden=1, url=http://www.google-analytics.com/generate_204
