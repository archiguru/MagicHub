🇺🇲 美国VIP = url-test, include-other-group=💨 VIPNodes, update-interval=7200, policy-regex-filter=(🇺🇸)|(美)|(States)|(US), no-alert=1, hidden=1, url=http://www.google-analytics.com/generate_204
