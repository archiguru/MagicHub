# > 外部节点
🇭🇰 香港节点 = url-test, include-other-group=🏳️‍🌈 SubNodes, update-interval=600, url=http://www.google-analytics.com/generate_204, policy-regex-filter=(🇭🇰)|(港)|(Hong)|(HK), no-alert=1, hidden=1, include-all-proxies=0
